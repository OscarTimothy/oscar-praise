<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>RSVPs · Oscar &amp; Praise (Hosts)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     CHANGE YOUR PASSWORD HERE  ↓↓↓   (share only with co-hosts)
     ============================================================ */
  /* (password is set in the <script> at the bottom: const PASS = "...") */

  :root {
    --paper: #f8f1e2; --paper-hi: #fdf8ee; --shell: #efe3c9;
    --burgundy: #823542; --burgundy-deep: #5e2530;
    --rose: #c98b95; --gold: #b08d4f; --gold-hi: #d8bd84; --gold-line: #cbb079;
    --ink: #6a513d; --ink-soft: #8a7257;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: radial-gradient(130% 100% at 50% 0%, #ecdcbd 0%, #e3d1b0 55%, #d9c4a0 100%);
    color: var(--ink); font-family: 'Cormorant Garamond', serif; -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 16px 60px; }

  .topbar { text-align: center; margin-bottom: 26px; }
  .topbar .script { font-family: 'Pinyon Script', cursive; font-size: 34px; color: var(--burgundy); line-height: 1; }
  .topbar .eyebrow { font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold); margin-top: 6px; }

  /* gate */
  .gate { max-width: 380px; margin: 8vh auto 0; text-align: center; }
  .gate .card {
    background: linear-gradient(160deg, #fbf4e4, var(--paper)); border: 1px solid var(--gold-line);
    border-radius: 20px; padding: 34px 26px; box-shadow: 0 26px 60px -28px rgba(94,60,30,0.4);
  }
  .gate h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 26px; color: var(--burgundy); margin-bottom: 4px; }
  .gate p { font-size: 15px; color: var(--ink-soft); margin-bottom: 18px; }
  .gate input {
    width: 100%; font-family: 'Cormorant Garamond', serif; font-size: 17px; text-align: center;
    color: var(--burgundy-deep); background: #fffdf7; border: 1px solid var(--gold-line);
    border-radius: 12px; padding: 12px 14px; outline: none; letter-spacing: 0.05em;
  }
  .gate input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(176,141,79,0.16); }
  .gate button {
    width: 100%; margin-top: 12px; cursor: pointer; font-family: 'Fraunces', serif; font-size: 16px; color: #fff;
    background: linear-gradient(165deg, #9a4150, #7e3342); border: none; border-radius: 12px; padding: 13px;
    transition: transform .4s cubic-bezier(0.22,0.61,0.36,1);
  }
  .gate button:hover { transform: translateY(-2px); }
  .gate .err { color: #bb4a40; font-style: italic; font-size: 14px; margin-top: 10px; min-height: 18px; }

  /* dashboard */
  .dash { display: none; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat {
    background: linear-gradient(160deg, #fbf4e4, var(--paper)); border: 1px solid var(--gold-line);
    border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.6);
  }
  .stat .n { font-family: 'Fraunces', serif; font-weight: 600; font-size: 30px; color: var(--burgundy); line-height: 1; }
  .stat .l { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-top: 6px; }

  .toolbar { display: flex; gap: 10px; justify-content: flex-end; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar .meta { margin-right: auto; font-size: 14px; color: var(--ink-soft); font-style: italic; }
  .toolbar button {
    cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 14.5px; color: var(--burgundy-deep);
    background: #fffdf7; border: 1px solid var(--gold-line); border-radius: 10px; padding: 9px 14px;
    transition: transform .35s cubic-bezier(0.22,0.61,0.36,1), border-color .3s;
  }
  .toolbar button:hover { transform: translateY(-1px); border-color: var(--gold); }

  .panel {
    background: linear-gradient(160deg, #fbf4e4, var(--paper)); border: 1px solid var(--gold-line);
    border-radius: 18px; padding: 8px; box-shadow: 0 24px 56px -30px rgba(94,60,30,0.4); overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(203,176,121,0.4);
  }
  thead th.r, tbody td.r { text-align: right; }
  tbody td { padding: 13px 14px; font-size: 16px; color: var(--burgundy-deep); border-bottom: 1px solid rgba(203,176,121,0.22); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,0.4); }
  .name { font-family: 'Fraunces', serif; font-weight: 500; }
  .tag { display: inline-block; font-size: 13px; padding: 3px 11px; border-radius: 999px; letter-spacing: 0.02em; }
  .tag.online { background: rgba(0,180,90,0.12); color: #1f7a48; border: 1px solid rgba(0,180,90,0.3); }
  .tag.restaurant { background: rgba(176,141,79,0.14); color: #8a6a2a; border: 1px solid rgba(176,141,79,0.35); }
  .when { color: var(--ink-soft); font-size: 14px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-style: italic; font-size: 16px; }

  @media (max-width: 560px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    tbody td, thead th { padding: 11px 9px; font-size: 15px; }
    .when { font-size: 12.5px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="script">Oscar &amp; Praise</div>
      <div class="eyebrow">RSVP List · Hosts Only</div>
    </div>

    <!-- password gate -->
    <div class="gate" id="gate">
      <div class="card">
        <h1>Private</h1>
        <p>Enter the host password to view RSVPs.</p>
        <input id="pw" type="password" placeholder="Password" autocomplete="off" />
        <button id="unlock">Unlock</button>
        <div class="err" id="gateErr"></div>
      </div>
    </div>

    <!-- dashboard -->
    <div class="dash" id="dash">
      <div class="stats">
        <div class="stat"><div class="n" id="sRsvp">0</div><div class="l">RSVPs</div></div>
        <div class="stat"><div class="n" id="sHeads">0</div><div class="l">Guests</div></div>
        <div class="stat"><div class="n" id="sOnline">0</div><div class="l">Paying online</div></div>
        <div class="stat"><div class="n" id="sRest">0</div><div class="l">At restaurant</div></div>
      </div>

      <div class="toolbar">
        <span class="meta" id="meta">Loading…</span>
        <button id="refreshBtn">↻ Refresh</button>
        <button id="csvBtn">⤓ Download CSV</button>
      </div>

      <div class="panel">
        <table>
          <thead>
            <tr><th>Name</th><th class="r">Party</th><th>Paying</th><th class="r">RSVP'd</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="emptyState" style="display:none;">No RSVPs yet — share the invite QR to get started.</div>
      </div>
    </div>
  </div>

<script>
  /* ============================================================
     HOST PASSWORD — change this string, then it's live on refresh.
     Share it only with your co-hosts.
     ============================================================ */
  const PASS = "praise2026";

  const STORE = "https://api.restful-api.dev/objects/ff8081819d82fab6019eb47bfe5a6e11";

  var gate = document.getElementById('gate');
  var dash = document.getElementById('dash');
  var pw = document.getElementById('pw');
  var gateErr = document.getElementById('gateErr');
  var data = [];

  function unlock() {
    if (pw.value === PASS) {
      sessionStorage.setItem('op_host', '1');
      gate.style.display = 'none';
      dash.style.display = 'block';
      load();
    } else {
      gateErr.textContent = 'Incorrect password.';
      pw.value = '';
    }
  }
  document.getElementById('unlock').addEventListener('click', unlock);
  pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') unlock(); });
  if (sessionStorage.getItem('op_host') === '1') { gate.style.display = 'none'; dash.style.display = 'block'; }

  function fmt(ts) {
    try {
      var d = new Date(ts);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ', ' +
             d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    } catch (e) { return ts || ''; }
  }

  function render() {
    var rows = document.getElementById('rows');
    var empty = document.getElementById('emptyState');
    rows.innerHTML = '';
    var heads = 0, online = 0, rest = 0;
    var sorted = data.slice().sort(function (a, b) { return new Date(b.ts) - new Date(a.ts); });
    sorted.forEach(function (r) {
      var g = parseInt(r.guests, 10) || 1;
      heads += g;
      if (r.pay === 'online') online++; else rest++;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name">' + esc(r.name) + '</td>' +
        '<td class="r">' + g + '</td>' +
        '<td><span class="tag ' + (r.pay === 'online' ? 'online' : 'restaurant') + '">' +
          (r.pay === 'online' ? 'Online' : 'Restaurant') + '</span></td>' +
        '<td class="r when">' + fmt(r.ts) + '</td>';
      rows.appendChild(tr);
    });
    document.getElementById('sRsvp').textContent = data.length;
    document.getElementById('sHeads').textContent = heads;
    document.getElementById('sOnline').textContent = online;
    document.getElementById('sRest').textContent = rest;
    document.getElementById('meta').textContent =
      data.length ? ('Estimated minimum: $' + (heads * 80).toLocaleString() + ' · updated ' + fmt(new Date().toISOString())) : '';
    empty.style.display = data.length ? 'none' : 'block';
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }

  function load() {
    document.getElementById('meta').textContent = 'Loading…';
    fetch(STORE + '?_=' + Date.now(), { headers: { 'Accept': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function (obj) {
        data = (obj && obj.data && Array.isArray(obj.data.list)) ? obj.data.list : [];
        render();
      })
      .catch(function () { document.getElementById('meta').textContent = 'Could not load — try Refresh.'; });
  }

  document.getElementById('refreshBtn').addEventListener('click', load);

  document.getElementById('csvBtn').addEventListener('click', function () {
    var rows = [['Name', 'Party size', 'Paying', 'RSVP date/time']];
    data.slice().sort(function (a, b) { return new Date(a.ts) - new Date(b.ts); }).forEach(function (r) {
      rows.push([r.name, (parseInt(r.guests, 10) || 1), (r.pay === 'online' ? 'Online' : 'Restaurant'), fmt(r.ts)]);
    });
    var csv = rows.map(function (row) {
      return row.map(function (cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; }).join(',');
    }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'oscar-praise-rsvps.csv';
    a.click();
  });

  // load once on open; refresh is manual (the free store caps daily requests, so we don't poll)
  if (sessionStorage.getItem('op_host') === '1') load();
</script>
</body>
</html>
